version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: smartqueue-postgres
    environment:
      POSTGRES_DB: smartqueue
      POSTGRES_USER: smartqueue_user
      POSTGRES_PASSWORD: smartqueue_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartqueue_user -d smartqueue"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: smartqueue-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: smartqueue-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: smartqueue-kafka-ui
    depends_on:
      - kafka
    ports:
      - "8090:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  redis:
    image: redis:7.2
    container_name: smartqueue-redis
    ports:
      - "6379:6379"
    # redis-server --appendonly yes → enables AOF persistence
    # so Redis doesn't lose data on restart
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      
  ai-classifier:
    build:
      context: ./ai-classifier
      dockerfile: Dockerfile
    container_name: smartqueue-ai-classifier
    ports:
      - "8000:8000"
    env_file:
      - ./ai-classifier/.env
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.48.0
    container_name: smartqueue-prometheus
    ports:
      - "9090:9090"
    volumes:
      # Mount our scrape config into the container
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      # Persist Prometheus data across restarts
      - prometheus_data:/prometheus
    command:
      # Tell Prometheus where its config file is (we mounted it above)
      - '--config.file=/etc/prometheus/prometheus.yml'
      # How long to keep data (15 days is good for local dev)
      - '--storage.tsdb.retention.time=15d'
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.2.0
    container_name: smartqueue-grafana
    depends_on:
      - prometheus
    ports:
      - "3000:3000"
    environment:
      # Default login: admin / admin (you'll be prompted to change on first login)
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      # Disable login screen for local dev (remove in production!)
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # Allow Grafana to load dashboards from provisioning folder
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/smartqueue.json
    volumes:
      # Auto-provision Prometheus as datasource
      - ./grafana/provisioning:/etc/grafana/provisioning
      # Auto-load our dashboard JSON
      - ./grafana/dashboards:/var/lib/grafana/dashboards
      # Persist Grafana data (saved dashboards, users, etc.)
      - grafana_data:/var/lib/grafana
    restart: unless-stopped        

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data: