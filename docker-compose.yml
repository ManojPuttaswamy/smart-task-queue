version: '3.8'

services:
  postgres:
    image: postgres:15
    container_name: smartqueue-postgres
    environment:
      POSTGRES_DB: smartqueue
      POSTGRES_USER: smartqueue_user
      POSTGRES_PASSWORD: smartqueue_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U smartqueue_user -d smartqueue"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data: