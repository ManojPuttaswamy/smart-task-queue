# Secret stores sensitive data — passwords, API keys, tokens.
#
# Why Secret and not ConfigMap?
# - Secrets are base64-encoded (NOT encrypted by default in K8s)
# - K8s can be configured to encrypt Secrets at rest (etcd encryption)
# - RBAC can restrict which pods/users can read Secrets
# - Secret values don't appear in kubectl describe output by default
#
# IMPORTANT: base64 is NOT encryption — it's just encoding.
# In production, use:
#   - AWS Secrets Manager + External Secrets Operator
#   - HashiCorp Vault
#   - Sealed Secrets (Bitnami)
# Never commit real secrets to Git.
#
# How to generate base64 values:
#   echo -n "smartqueue_pass" | base64
#   → c21hcnRxdWV1ZV9wYXNz

apiVersion: v1
kind: Secret
metadata:
  name: smartqueue-secret
  namespace: default
  labels:
    app: smartqueue
type: Opaque
data:
  # echo -n "smartqueue_pass" | base64
  SPRING_DATASOURCE_PASSWORD: c21hcnRxdWV1ZV9wYXNz

  # echo -n "smartqueue-super-secret-key-change-in-production-min-32-chars" | base64
  JWT_SECRET: c21hcnRxdWV1ZS1zdXBlci1zZWNyZXQta2V5LWNoYW5nZS1pbi1wcm9kdWN0aW9uLW1pbi0zMi1jaGFycw==

  # echo -n "smartqueue_user" | base64
  POSTGRES_USER: c21hcnRxdWV1ZV91c2Vy

  # echo -n "smartqueue_pass" | base64
  POSTGRES_PASSWORD: c21hcnRxdWV1ZV9wYXNz