# PostgreSQL Deployment + Service + PersistentVolumeClaim
#
# In production you'd use a managed DB (AWS RDS, GCP Cloud SQL).
# For local Minikube dev, we run PostgreSQL as a pod.
#
# Key concept — PersistentVolumeClaim (PVC):
#   Pods are ephemeral — if the pod restarts, all data is lost.
#   A PVC requests persistent storage from K8s that survives pod restarts.
#   Minikube automatically provisions a local PersistentVolume for PVCs.

# ── PersistentVolumeClaim ─────────────────────────────────────────────────────
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgres-pvc
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce    # Only one pod can mount this at a time
  resources:
    requests:
      storage: 1Gi     # Request 1GB of storage

---
# ── Deployment ────────────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: default
  labels:
    app: postgres
spec:
  replicas: 1   # Stateful apps like DBs typically run as 1 replica
                # For HA, use StatefulSet + streaming replication instead
  selector:
    matchLabels:
      app: postgres
  template:
    metadata:
      labels:
        app: postgres
    spec:
      containers:
        - name: postgres
          image: postgres:15
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_DB
              value: smartqueue
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: smartqueue-secret
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: smartqueue-secret
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-storage
              mountPath: /var/lib/postgresql/data
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "smartqueue_user", "-d", "smartqueue"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: postgres-storage
          persistentVolumeClaim:
            claimName: postgres-pvc

---
# ── Service ───────────────────────────────────────────────────────────────────
# ClusterIP (default) — only accessible inside the cluster
# Other pods reach PostgreSQL via: postgres-service:5432
apiVersion: v1
kind: Service
metadata:
  name: postgres-service
  namespace: default
spec:
  selector:
    app: postgres
  ports:
    - port: 5432
      targetPort: 5432