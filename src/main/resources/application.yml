spring:
  application:
    name: smart-task-queue

  datasource:
    url: jdbc:postgresql://localhost:5432/smartqueue
    username: smartqueue_user
    password: smartqueue_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    open-in-view: false
    properties:
      hibernate:
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: true
    consumer:
      group-id: job-processor
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"

  data:
    redis:
      host: localhost
      port: 6379

kafka:
  topics:
    job-events: job-events
    job-dlq: job-dlq

redis:
  idempotency:
    ttl-hours: 24

# ── JWT Configuration ────────────────────────────────────────────────────────
#
# jwt.secret:
#   The key used to sign and verify all JWT tokens.
#   Must be at least 32 characters (256 bits) for HMAC-SHA256.
#   In production: load this from AWS Secrets Manager, HashiCorp Vault,
#   or an environment variable — NEVER hardcode a real secret in source code.
#
# jwt.expiration-ms:
#   How long a token stays valid. 86400000 ms = 24 hours.
#   After expiry, the user must log in again to get a new token.
#
jwt:
  secret: smartqueue-super-secret-key-change-in-production-min-32-chars
  expiration-ms: 86400000

server:
  port: 8080

logging:
  level:
    com.smartqueue: DEBUG
    org.springframework.web: INFO
    org.springframework.kafka: INFO