spring:
  application:
    name: smart-task-queue

  datasource:
    url: jdbc:postgresql://localhost:5432/smartqueue
    username: smartqueue_user
    password: smartqueue_pass
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update        # auto-creates/updates tables on startup
    show-sql: true            # logs every SQL query
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  kafka:
    bootstrap-servers: localhost:9092
    producer:
      # Serialize keys and values as JSON
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        # Includes Java type info in message headers so consumer knows how to deserialize
        spring.json.add.type.headers: true

kafka:
  topics:
    job-events: job-events    # the Kafka topic name we publish to

server:
  port: 8080

logging:
  level:
    com.smartqueue: DEBUG
    org.springframework.web: INFO